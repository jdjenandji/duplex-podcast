name: Migrate Supabase

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/migration-trigger

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply Supabase migrations
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          if [ -z "$SUPABASE_DATABASE_URL" ]; then
            echo "SUPABASE_DATABASE_URL is not configured."
            exit 1
          fi
          npm run db:migrate
